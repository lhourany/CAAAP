<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>IPS · Curriculum &amp; Assessment Review</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Spectral:wght@500;600;700&family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<!-- LH: SheetJS for reading the CAR Review Template .xlsx on import -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --ink:#1c1c1e; --muted:#71717a; --soft:#9aa0aa;
  --line:#e7e7ea; --line-2:#f1f1f3; --bg:#ffffff; --panel:#fbfbfc; --card:#ffffff;
  --active:#f3f3f5; --accent:#1c1c1e;
  --ok:#2f8f5b; --ok-bg:#e9f4ee; --warn:#bd7d1c; --warn-bg:#fbf2df; --con:#c0392b; --con-bg:#f8eae8;
  --serif:'Spectral',Georgia,serif; --sans:'Public Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --shadow:0 1px 2px rgba(20,20,30,.04),0 1px 14px rgba(20,20,30,.04);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:var(--sans);color:var(--ink);background:var(--bg);font-size:14px;line-height:1.55;-webkit-font-smoothing:antialiased}
h1,h2,h3,h4{font-family:var(--serif);font-weight:600;margin:0;color:var(--ink);letter-spacing:.1px}
button{font-family:var(--sans);cursor:pointer}
.app{display:grid;grid-template-columns:232px 1fr;grid-template-rows:60px 1fr;grid-template-areas:"brand header" "side main";min-height:100vh}
.brand{grid-area:brand;background:#fff;display:flex;align-items:center;gap:11px;padding:0 18px;border-bottom:1px solid var(--line);border-right:1px solid var(--line)}
.mark{width:30px;height:30px;border-radius:7px;background:var(--ink);display:grid;place-items:center;color:#fff;font-family:var(--serif);font-weight:700;font-size:16px;flex:none;cursor:pointer;overflow:hidden}
.mark img{width:100%;height:100%;object-fit:cover}
.brand .name{font-family:var(--serif);font-weight:600;font-size:15px;line-height:1.1}
.brand .sub{color:var(--soft);font-size:10px;letter-spacing:.7px;text-transform:uppercase}
.logo-pop{position:fixed;top:60px;left:12px;z-index:60;width:252px;background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:0 10px 34px rgba(20,20,30,.18);padding:14px;font-family:var(--sans);display:none}
.logo-pop.open{display:block}
.logo-pop h5{font-family:var(--sans);font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);margin:0 0 7px}
.logo-pop .row{margin-bottom:13px}
.logo-pop .sw{display:flex;gap:7px;align-items:center;flex-wrap:wrap}
.logo-pop .swatch{width:24px;height:24px;border-radius:6px;border:1px solid var(--line);cursor:pointer;padding:0}
.logo-pop .swatch.sel{outline:2px solid var(--ink);outline-offset:1px}
.logo-pop .swatch.trans{background:repeating-conic-gradient(#cfcfcf 0 25%,#fff 0 50%) 50%/10px 10px}
.logo-pop input[type=range]{width:100%}
.logo-pop input[type=color]{width:26px;height:26px;border:1px solid var(--line);border-radius:6px;padding:0;background:#fff;cursor:pointer}
.logo-pop .lp-act{display:flex;gap:8px;justify-content:space-between;align-items:center}
.logo-pop .lp-btn{font-size:12px;font-weight:600;border-radius:7px;padding:7px 11px;border:1px solid var(--ink);background:var(--ink);color:#fff;cursor:pointer}
.logo-pop .lp-btn.ghost{background:#fff;color:var(--ink)}
.logo-pop .lp-btn.danger{background:#fff;color:#c0392b;border-color:#e0b8b2}
.logo-pop label.ck{display:flex;gap:7px;align-items:center;font-size:12.5px;color:var(--ink);cursor:pointer;margin:0}
.header{grid-area:header;background:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 24px;border-bottom:1px solid var(--line)}
.header .crumbs{font-size:12.5px;color:var(--muted)}
.header .crumbs b{color:var(--ink);font-weight:600}
.header .crumbs a{color:var(--muted);text-decoration:none}
.header .who{display:flex;align-items:center;gap:9px;font-size:12.5px;color:var(--muted)}
.avatar{width:28px;height:28px;border-radius:50%;background:var(--active);color:var(--ink);display:grid;place-items:center;font-weight:700;font-size:11px}
.side{grid-area:side;background:#fff;border-right:1px solid var(--line);padding:16px 12px}
.side a{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;color:#52525b;text-decoration:none;font-size:13px;font-weight:500;margin-bottom:2px}
.side a .ic{width:16px;text-align:center;opacity:.6}
.side a.active{background:var(--active);color:var(--ink);font-weight:600}
.side a.active .ic{opacity:1}
.side a:hover:not(.active){background:#fafafa}
.side .grp{font-size:10px;letter-spacing:.8px;text-transform:uppercase;color:var(--soft);padding:14px 12px 6px}
.main{grid-area:main;padding:26px 32px;overflow:auto}
.page-h{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:18px;animation:rise .45s ease both}
.page-h h1{font-size:25px}
.page-h p{margin:5px 0 0;color:var(--muted);font-size:13px}
.btn{border:1px solid var(--ink);background:var(--ink);color:#fff;padding:9px 16px;border-radius:8px;font-weight:600;font-size:13px;transition:.15s}
.btn:hover{opacity:.9}
.btn.ghost{background:#fff;color:var(--ink);border-color:var(--line)}
.btn.ghost:hover{border-color:var(--soft)}
/* LH: header toolbar (Print / Save as / Colour) */
.htools{display:inline-flex;align-items:center;gap:8px}
.htools .btn{padding:7px 13px;font-size:12.5px}
/* LH: header-colour popup reuses .logo-pop but anchors to the right */
.logo-pop.hp{left:auto;right:18px}
/* LH: keep header text legible when a dark header colour is chosen */
.header.lh-dark .crumbs{color:#cfd3da}
.header.lh-dark .crumbs b,.header.lh-dark .crumbs a,.header.lh-dark .who{color:#fff}
.header.lh-dark .avatar{background:rgba(255,255,255,.18);color:#fff}
.header.lh-dark .htools .btn{background:transparent;color:#fff;border-color:rgba(255,255,255,.35)}
/* LH: print / save-as-PDF layout -- drop the app chrome, flow the open view */
@media print{
  .brand,.side,.logo-pop,#headerPop,.htools{display:none!important}
  .app{display:block!important;min-height:0!important}
  .main{padding:0!important;overflow:visible!important}
  .header{position:static;border:none;padding:0 0 14px;background:transparent!important;color:var(--ink)!important}
  .header .who{color:var(--muted)!important}
  body{background:#fff}
  .card{box-shadow:none!important;break-inside:avoid}
  a[href]{text-decoration:none;color:inherit}
}
/* LH: landing screen (is this a new review?) */
.start-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;max-width:780px}
.start-card{text-align:left;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:22px;cursor:pointer;box-shadow:var(--shadow);font-family:var(--sans);transition:.15s}
.start-card:hover{border-color:var(--soft);box-shadow:var(--shadow)}
.start-card .si{width:34px;height:34px;border-radius:8px;background:var(--active);display:grid;place-items:center;font-size:18px;color:var(--ink);margin-bottom:13px}
.start-card h3{font-size:16px;margin-bottom:6px}
.start-card p{color:var(--muted);font-size:12.5px;margin:0;line-height:1.5}
/* LH: new-review intake form */
.intake{display:grid;grid-template-columns:1fr 1fr;gap:15px 18px;padding:20px}
.intake label{display:flex;flex-direction:column;gap:6px;font-size:10.5px;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);font-weight:700}
.intake label.full{grid-column:1 / -1}
.intake input,.intake select,.intake textarea{font-family:var(--sans);font-size:13.5px;color:var(--ink);background:#fff;border:1px solid var(--line);border-radius:8px;padding:9px 11px;font-weight:400;text-transform:none;letter-spacing:0}
.intake input:focus,.intake select:focus,.intake textarea:focus{outline:none;border-color:var(--soft)}
/* LH: editable summary fields (draft only) + locked banner + reassign + owner history */
.fields .ef{font-family:var(--sans);font-size:13px;color:var(--ink);background:#fff;border:1px solid var(--line);border-radius:7px;padding:7px 9px;width:100%}
.fields .ef:focus{outline:none;border-color:var(--soft)}
.lockbar{font-size:11.5px;line-height:1.5;color:var(--muted);background:var(--panel);border:1px solid var(--line-2);border-radius:8px;padding:10px 13px;margin-bottom:13px}
.owner-edit input{font-family:var(--sans);font-size:13px;border:1px solid var(--line);border-radius:7px;padding:8px 10px;margin-right:8px;min-width:200px}
.ohist{font-size:11.5px;color:var(--muted);margin-top:10px;border-top:1px solid var(--line-2);padding-top:8px}
.ohist .row{padding:2px 0}
/* LH: evidence line under an imported answer */
.evid{margin-top:6px;font-size:11.5px;color:var(--muted);background:var(--panel);border:1px solid var(--line-2);border-radius:6px;padding:6px 9px}
.tabs{display:flex;gap:2px;border-bottom:1px solid var(--line);margin-bottom:22px}
.tabs button{background:none;border:none;padding:11px 18px;font-size:13.5px;font-weight:600;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px;transition:.15s}
.tabs button.active{color:var(--ink);border-bottom-color:var(--ink)}
.tabs button:hover:not(.active){color:var(--ink)}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);margin-bottom:16px;overflow:hidden}
.card .ch{padding:14px 18px;border-bottom:1px solid var(--line-2);display:flex;align-items:center;justify-content:space-between}
.card .ch h3{font-size:15px}
.card .cb{padding:18px}
.review-item{padding:18px;cursor:pointer;transition:.15s;border-left:3px solid transparent}
.review-item:hover{background:var(--panel);border-left-color:var(--ink)}
.review-item .ttl{font-family:var(--serif);font-size:17px;font-weight:600}
.review-item .meta{color:var(--muted);font-size:12px;margin-top:3px}
.pill{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;padding:3px 9px;border-radius:20px;border:1px solid var(--line);color:var(--muted);background:#fafafa;vertical-align:middle}
.flow{display:flex;align-items:center;gap:0;margin:6px 0 4px;flex-wrap:wrap}
.node{display:flex;align-items:center;gap:8px}
.dot{width:15px;height:15px;border-radius:50%;border:2px solid #cfd0d6;background:#fff;flex:none}
.node.done .dot{background:var(--ink);border-color:var(--ink)}
.node.current .dot{background:#fff;border-color:var(--ink);box-shadow:0 0 0 4px var(--active)}
.node .lbl{font-size:11px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:var(--soft);white-space:nowrap}
.node.done .lbl,.node.current .lbl{color:var(--ink)}
.seg{height:2px;background:#e0e1e6;flex:1;min-width:24px;margin:0 10px}
.seg.done{background:var(--ink)}
.detail-h{display:flex;align-items:flex-start;justify-content:space-between;gap:20px;margin-bottom:6px}
.detail-h h1{font-size:22px;max-width:760px}
.subtabs{display:flex;gap:24px;border-bottom:1px solid var(--line);margin:18px 0 0}
.subtabs button{background:none;border:none;padding:11px 2px;font-size:13px;font-weight:600;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px}
.subtabs button.active{color:var(--ink);border-bottom-color:var(--ink)}
.toolbar{display:flex;gap:16px;font-size:12px;color:var(--muted);margin-top:10px}
.fields{display:grid;grid-template-columns:200px 1fr}
.fields .k{padding:11px 18px;background:var(--panel);border-bottom:1px solid var(--line-2);font-weight:600;color:#52525b;font-size:12.5px}
.fields .v{padding:11px 18px;border-bottom:1px solid var(--line-2);font-size:13px}
.fields .k:last-of-type,.fields .v:last-of-type{border-bottom:none}
.cr-wrap{display:grid;grid-template-columns:228px 1fr;gap:22px;align-items:start}
.cr-nav{position:sticky;top:0;background:#fff;border:1px solid var(--line);border-radius:12px;padding:10px;box-shadow:var(--shadow)}
.cr-nav a{display:block;padding:7px 10px;border-radius:7px;font-size:12px;color:#56565f;text-decoration:none;font-weight:500;line-height:1.3}
.cr-nav a:hover{background:var(--active)}
.cr-nav a .num{color:var(--soft);font-weight:700;font-family:var(--serif)}
.sec-h{display:flex;align-items:baseline;gap:10px;margin:22px 4px 10px}
.sec-h .n{font-family:var(--serif);font-size:13px;font-weight:700;color:#fff;background:var(--ink);width:24px;height:24px;border-radius:6px;display:grid;place-items:center;flex:none}
.sec-h h2{font-size:16px}
.sec-h .lin{font-size:10.5px;color:var(--soft);letter-spacing:.4px;text-transform:uppercase;margin-left:auto;white-space:nowrap}
.q{background:#fff;border:1px solid var(--line);border-radius:11px;margin-bottom:12px;overflow:hidden}
.q .qh{display:grid;grid-template-columns:1fr 1.15fr;gap:0}
.q .ql{padding:15px 17px;border-right:1px solid var(--line-2);background:var(--panel)}
.q .qtag{display:inline-block;font-size:10px;font-weight:700;color:var(--muted);background:#fff;border:1px solid var(--line);padding:2px 7px;border-radius:5px;margin-bottom:7px;letter-spacing:.3px}
.q .qt{font-size:13px;line-height:1.5}
.q .qa{padding:13px 16px}
.q .qa .lab{font-size:10.5px;letter-spacing:.5px;text-transform:uppercase;color:var(--soft);font-weight:700;display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.statset{display:inline-flex;gap:5px}
.sp{font-style:normal;font-size:12px;cursor:pointer;opacity:.3;width:20px;height:20px;display:grid;place-items:center;border-radius:5px;transition:.12s}
.sp:hover{opacity:.7}
.sp.ok.active{opacity:1;color:var(--ok);background:var(--ok-bg)} .sp.warn.active{opacity:1;color:var(--warn);background:var(--warn-bg)} .sp.con.active{opacity:1;color:var(--con);background:var(--con-bg)}
.q textarea{width:100%;border:1px solid var(--line);border-radius:8px;padding:10px;font-family:var(--sans);font-size:12.5px;line-height:1.55;color:#3a3a42;resize:vertical;min-height:90px;background:#fff}
.q textarea::placeholder{color:#b5b8bf;font-style:italic}
.q textarea:focus{outline:none;border-color:var(--soft);box-shadow:0 0 0 3px var(--active)}
table{width:100%;border-collapse:collapse;font-size:12.5px}
th{text-align:left;font-size:10.5px;letter-spacing:.5px;text-transform:uppercase;color:var(--soft);font-weight:700;padding:11px 14px;border-bottom:1px solid var(--line)}
td{padding:13px 14px;border-bottom:1px solid var(--line-2);vertical-align:top}
.ap-detail{background:var(--panel)}
.ap-detail .row{display:grid;grid-template-columns:160px 1fr;border-bottom:1px solid var(--line-2)}
.ap-detail .row:last-child{border-bottom:none}
.ap-detail .rk{padding:9px 14px;color:#52525b;font-weight:600} .ap-detail .rv{padding:9px 14px}
.refpill{display:inline-block;font-size:10.5px;font-weight:700;letter-spacing:.3px;padding:2px 7px;border-radius:5px;margin:0 4px 3px 0;border:1px solid var(--line);background:#fafafa;color:#52525b}
.refpill.p{border-color:#d2d2d8;background:#f3f3f5;color:#3f3f46}
.refpill.q{border-color:#e2e2e6;background:#fff;color:#6b6b73}
.ap-form{padding:16px 18px;border-bottom:1px solid var(--line-2);background:var(--panel)}
.ap-form .afl{font-size:10.5px;letter-spacing:.6px;text-transform:uppercase;color:var(--soft);font-weight:700;margin:14px 0 6px}
.ap-form .afl.first{margin-top:0}
.ap-form textarea,.ap-form input{width:100%;border:1px solid var(--line);border-radius:8px;padding:9px 10px;font-family:var(--sans);font-size:12.5px;color:#3a3a42;background:#fff;box-sizing:border-box}
.ap-form textarea{min-height:58px;resize:vertical}
.ap-form .af2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{cursor:pointer;user-select:none;font-size:11px;font-weight:700;letter-spacing:.3px;padding:4px 9px;border-radius:6px;border:1px solid var(--line);background:#fff;color:#71717a}
.chip:hover{border-color:#bcbcc4}
.chip.on{background:#3f3f46;border-color:#3f3f46;color:#fff}
.vcheck{background:#fff;border:1px solid var(--line);border-radius:11px;padding:14px 16px;margin-bottom:12px}
.vcheck .vc-h{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:8px}
.vc-app{font-size:11.5px;color:var(--muted);background:var(--panel);border:1px solid var(--line-2);border-radius:7px;padding:6px 9px;margin-bottom:6px}
.vc-judge{font-size:12.5px;color:#3a3a42;margin-bottom:10px}
.vc-app b,.vc-judge b{color:#52525b;font-weight:700}
.vthread{border-top:1px solid var(--line-2);padding-top:9px}
.vcm{font-size:12px;color:#3a3a42;padding:5px 0;line-height:1.5}
.vcw{font-weight:700;color:#52525b}
.vempty{font-size:11.5px;color:var(--soft);font-style:italic;padding:2px 0}
.vpost{display:flex;gap:8px;margin-top:9px}
.vpost input{flex:1;border:1px solid var(--line);border-radius:8px;padding:8px 10px;font-family:var(--sans);font-size:12.5px;color:#3a3a42}
.vstamp{font-size:12.5px;color:#3a3a42;background:var(--panel);border:1px solid var(--line-2);border-left:3px solid #3f3f46;border-radius:7px;padding:10px 12px}
.rrow{border-top:1px solid var(--line-2);padding:11px 0}
.rrow:first-of-type{border-top:none}
.rrow-h{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.rrow-a{font-size:12.5px;color:#3a3a42;line-height:1.55;margin-bottom:8px;white-space:pre-wrap}
.rb{font-style:normal;font-size:11px;width:18px;height:18px;display:inline-grid;place-items:center;border-radius:4px}
.rb.ok{color:var(--ok);background:var(--ok-bg)} .rb.warn{color:var(--warn);background:var(--warn-bg)} .rb.con{color:var(--con);background:var(--con-bg)}
.vbnote{margin-top:8px;border-left:3px solid #c9c9d0;background:var(--panel);border-radius:0 7px 7px 0;padding:7px 11px}
.vbn-h{display:block;font-size:10px;letter-spacing:.5px;text-transform:uppercase;color:var(--soft);font-weight:700;margin-bottom:3px}
.vbn-c{font-size:12px;color:#3a3a42;line-height:1.5;padding:2px 0}
.att{display:flex;align-items:center;gap:13px;padding:13px 16px;border:1px solid var(--line);border-radius:9px;margin-bottom:9px}
.att .fi{width:34px;height:34px;border-radius:7px;background:var(--active);display:grid;place-items:center;font-size:13px;flex:none}
.att .fn{font-weight:600;font-size:13px} .att .fm{font-size:11px;color:var(--muted)}
.empty{text-align:center;padding:56px 24px;color:var(--muted)}
.empty .ei{font-size:28px;opacity:.3;margin-bottom:10px}
.empty h3{color:#56565f;font-size:16px;margin-bottom:6px}
.empty p{max-width:430px;margin:0 auto;font-size:13px}
.note{font-size:11.5px;color:var(--soft);margin-top:16px;font-style:italic}
.prin{display:flex;gap:14px;padding:15px 18px;border-bottom:1px solid var(--line-2)}
.prin:last-child{border-bottom:none}
.prin .pn{font-family:var(--serif);font-weight:700;font-size:15px;color:var(--ink);width:30px;flex:none}
.prin .pt{font-weight:600;font-size:13.5px;margin-bottom:2px}
.prin .ps{font-size:12.5px;color:var(--muted);line-height:1.5}
.std{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:14px 18px;border-bottom:1px solid var(--line-2);text-decoration:none;color:inherit}
.std:last-child{border-bottom:none}
.std:hover{background:var(--panel)}
.std .sn{font-weight:600;font-size:13.5px} .std .sd{font-size:12px;color:var(--muted);margin-top:1px}
.std .su{font-size:12px;color:var(--muted)}
.hidden{display:none}
@keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.fade{animation:rise .35s ease both}
@media(max-width:920px){.app{grid-template-columns:1fr;grid-template-areas:"brand" "header" "main"}.side{display:none}.cr-wrap{grid-template-columns:1fr}.cr-nav{display:none}.q .qh{grid-template-columns:1fr}.q .ql{border-right:none;border-bottom:1px solid var(--line-2)}}
</style>
</head>
<body>
<div class="app">
  <div class="brand"><div class="mark" id="carLogo" title="Logo settings">ا</div><div id="brandMeta"><div class="name">Al Ittihad</div><div class="sub">CAR Platform</div></div></div>
  <input type="file" id="carLogoInput" accept="image/*" style="display:none">
  <!-- LH: hidden picker for importing a completed CAR Review Template -->

<script>
// LH: SECTIONS is the shared CAAAP question template -- every review uses the same structure (Principle 13)
const SECTIONS=[
    {n:1,t:"Context & review history",lin:"P12",qs:[
      {tag:"Q1 · P12",q:"What does the available evidence and any prior review tell us about this subject and grade? Where this is the first CAR, say so and establish the baseline from current data.",ex:"e.g. First CAR for this subject-grade; baseline drawn from AY24–25 marks, MAP and item analysis."}]},
    {n:2,t:"Strategic alignment",lin:"P3 · checklist A · light",qs:[
      {tag:"Q2 · P3",q:"Does this curriculum align with the school's vision and strategic priorities, reflect UAE and regulatory expectations, and support future-ready competencies? Identify any area only partially met.",ex:"e.g. Aligned with school priorities and ADEK/MoE; future-ready digital-tool use only partially embedded."}]},
    {n:3,t:"Curriculum — intended",lin:"checklist B, C",qs:[
      {tag:"Q3 · P4",q:"Is each learning outcome anchored to one of the curriculum's adopted standards (CCSS, NGSS, MoE, AP)? Identify any outcome that addresses no standard, or standard that no outcome addresses.",ex:"e.g. Most outcomes map to CCSS-M; note any outcome with no standard, or standard with no outcome."},
      {tag:"Q4 · P5",q:"Are the learning outcomes clearly defined and measurable, expressed with the action verbs the Curriculum Policy sanctions (Appendix 3(c))? Identify any outcomes that need revising.",ex:"e.g. Several outcomes open with 'understand/know' and need rewriting to measurable verbs (Appendix 3(c))."},
      {tag:"Q5 · P6",q:"Is each learning outcome assigned a DOK level, and how does the curriculum's DOK distribution compare with the required 20/35/30/15? Where it falls short, explain whether the curriculum supports assessment at the higher levels.",ex:"e.g. DOK profile ~30/55/12/3 against the required 20/35/30/15 — thin at Levels 3–4."},
      {tag:"Q6 · P10",q:"Does the curriculum build on the grade below and prepare for the grade above (vertical), connect with other subjects in the same grade (horizontal), and follow a logical scope and sequence without gaps or repetition?",ex:"e.g. Vertical links named; horizontal links to other subjects (e.g. Science data/graphs) not yet mapped."}]},
    {n:4,t:"Delivery — enacted",lin:"P7, P10 · Curriculum Policy §XI",qs:[
      {tag:"Q7 · enactment",q:"Is what is taught — through the pacing guides and classroom delivery — aligned with what the curriculum intends? Identify where the enacted curriculum diverges from the intended in pacing, coverage, or depth.",ex:"e.g. Pacing slips ~2 weeks; the enacted curriculum diverges from intended in the final units."}]},
    {n:5,t:"Assessment — assessed",lin:"checklist G",qs:[
      {tag:"Q8 · P7",q:"Does each assessment item trace to a learning outcome and, through it, to a standard? Identify any outcome left unassessed across the year, and any item not anchored to an outcome.",ex:"e.g. Most items map to a topic, not an outcome; some outcomes left unassessed this year."},
      {tag:"Q9 · P8",q:"Does each Grade 6–12 mid- and end-semester exam have a current TOS meeting all four axes (DOK, coverage, difficulty by grade, question type)? Confirm three parallel versions are prepared, and explain any axis not met.",ex:"e.g. TOS exists, three versions prepared; DOK axis not met — paper under-weight at DOK 3–4."},
      {tag:"Q10 · P8",q:"Beyond alignment, is the assessment well-designed — authentic, varied, balanced formative/summative — and are moderation and the use of results to adjust teaching in place? Identify weaknesses.",ex:"e.g. Heavy on MCQ/short answer; no cross-campus moderation; item analysis not used to re-teach."},
      {tag:"Q11 · P9",q:"Do learning outcomes and assessment items carry stable identifiers, so a result can be traced result → item → outcome → standard? Identify where the chain breaks.",ex:"e.g. Outcomes have IDs; items do not; marks captured as totals — chain breaks at item → result."}]},
    {n:6,t:"Attainment",lin:"P12 · checklist I",qs:[
      {tag:"Q12 · P12",q:"To what extent are students achieving the learning outcomes, and what does the attainment evidence (marks, item analysis, MAP, IBT, AP) say about the curriculum and its assessment?",ex:"e.g. MAP at/above norm; EoS mean ~68%; weakest on multi-step / reasoning items."}]},
    {n:7,t:"Resources",lin:"checklist H · Curriculum Policy Table 14/16",qs:[
      {tag:"Q13 · resources",q:"Are the core and digital resources — textbooks, platforms, materials — current and mapped to the learning outcomes and standards? Identify gaps.",ex:"e.g. Textbooks current; digital tools available but not embedded in the curriculum map."}]},
    {n:8,t:"Inspection readiness",lin:"P3 · UAE School Inspection Framework",qs:[
      {tag:"Q14 · P3",q:"What does this curriculum and its assessment show for readiness against the framework's Curriculum standard (design, implementation, adaptation) and Teaching and Assessment standard, with attainment under Students' Achievement?",ex:"e.g. Curriculum standard sound; moderation gap is the main Teaching-and-Assessment risk."}]},
    {n:9,t:"Operational readiness",lin:"checklist J · light",qs:[
      {tag:"Q15 · operational",q:"Are staffing, teacher expertise, timetable and PD adequate to deliver this curriculum as designed, and are monitoring and department collaboration in place? Identify any constraint affecting delivery.",ex:"e.g. Staffing adequate; PD gap in DOK 3–4 item writing and moderation."}]},

      {tag:"Q16 · P1–P14",q:"Does this curriculum and its assessment align with the CAAAP principles? Where it does not, explain and provide the rationale. Refer to the principles by number and point to the mapping canvas as evidence.",ex:"e.g. Partial alignment — strong on P4/P5/P10; gaps on P6, P7, P9; refer to principles by number."}]},

      {tag:"Q17 · P12",q:"Based on this review, are there risks to the alignment, coverage, or quality of this subject and grade? If yes, provide detail, with the evidence for each.",ex:"e.g. Three risks: low DOK 3–4, no moderation, item-level data not captured — with evidence for each."}]}

const EXAMPLE_ACTION={id:"CAR-001 (example)",who:"Louis Hourany",prin:[6],qs:[5,9],status:"Open",

// LH: ----- Reviews collection (multi-review model; mirrors a future `reviews` table) -----
// LH: makeReview builds one review record. All mutable state lives ON the record so it
// LH: serialises cleanly for Save-as and maps 1:1 to DB columns/child rows later.
let rid=0;
function makeReview(o){
  o=o||{};
  return {
    id:o.id||('CAR-'+(new Date().getFullYear())+'-'+String(++rid).padStart(3,'0')),
    title:o.title||((o.grade?o.grade+' ':'')+(o.subject||'Untitled')+' — Review'),
    type:o.type||'Annual review', subject:o.subject||'', grade:o.grade||'',
    campuses:o.campuses||'All five campuses', year:o.year||'', rationale:o.rationale||'',
    trigger:o.trigger||'Scheduled annual review',
    owner:o.owner||'', email:o.email||'',
    stage:o.stage||'draft',
    answers:o.answers||{}, rcomments:o.rcomments||{}, vstatus:o.vstatus||{},
    aqstatus:o.aqstatus||{}, aqnotes:o.aqnotes||[],
    vcomments:o.vcomments||{}, aqcomments:o.aqcomments||{},
    actions:o.actions||[], apN:o.apN||1,
    vbDate:o.vbDate||'', aqcDate:o.aqcDate||'',
    ownerHistory:o.ownerHistory||[]
  };
}
let REVIEWS=[];     // LH: all reviews; the dashboard is just a query over this set
let REVIEW=null;    // LH: the currently open review (null on the landing/list screens)
// LH: working globals point at the current review's state; loadReview rebinds them
let ANSWERS={}, RCOMMENTS={}, VSTATUS={}, AQSTATUS={}, AQNOTES=[], VCOMMENTS={}, AQCOMMENTS={}, ACTIONS=[];
let stage='draft', apN=1, vbDate='', aqcDate='';
function loadReview(rec){
  REVIEW=rec;
  ANSWERS=rec.answers; RCOMMENTS=rec.rcomments; VSTATUS=rec.vstatus; AQSTATUS=rec.aqstatus;
  AQNOTES=rec.aqnotes; VCOMMENTS=rec.vcomments; AQCOMMENTS=rec.aqcomments; ACTIONS=rec.actions;
  stage=rec.stage; apN=rec.apN; vbDate=rec.vbDate; aqcDate=rec.aqcDate;
}
function syncReview(){ // LH: write the working globals back onto the current record (runs every render)
  if(!REVIEW) return;
  REVIEW.answers=ANSWERS; REVIEW.rcomments=RCOMMENTS; REVIEW.vstatus=VSTATUS; REVIEW.aqstatus=AQSTATUS;
  REVIEW.aqnotes=AQNOTES; REVIEW.vcomments=VCOMMENTS; REVIEW.aqcomments=AQCOMMENTS; REVIEW.actions=ACTIONS;
  REVIEW.stage=stage; REVIEW.apN=apN; REVIEW.vbDate=vbDate; REVIEW.aqcDate=aqcDate;
}

const PRINCIPLES=[
  ["1","Definitions and the alignment chain","The aligned objects — standards, curriculum map, learning outcomes, assessment, Table of Specifications — are used as the policy defines them. An object is not relabelled to mean something it is not."],
  ["2","Stewardship","Every subject and grade has a named owner. Changes are approved through the school's quality roles and ratified by the Validation Board and the Academic Quality Committee, not by the author alone."],
  ["3","Quality assurance","Curriculum and assessment are quality-assured through the Curriculum Quality Cycle and against ADEK, KHDA, Cognia and MoE. A claim of alignment that cannot point to evidence is not assured."],
  ["4","Standards as first-class anchors","Every curriculum is anchored to its adopted standards (CCSS, NGSS, MoE, AP) as identifiable, referenceable objects. Each outcome states the standard it addresses, and that link can be retrieved."],
  ["5","Outcomes are measurable","Outcomes are clearly defined and measurable, using the verbs the Curriculum Policy sanctions (Appendix 3(c)). Outcomes built on unmeasurable verbs are revised before approval."],
  ["6","Cognitive demand is explicit (DOK)","Each outcome carries a Depth of Knowledge level. For Grades 6–12 the profile follows 20/35/30/15. DOK is distinct from difficulty and recorded separately."],
  ["7","Constructive alignment","Assessment is built against the curriculum. Every item traces to a learning outcome and, through it, to a standard; no outcome intended for assessment is left unassessed."],
  ["8","The Table of Specifications governs exams","Every Grade 6–12 exam is built from a TOS validating DOK distribution, coverage, difficulty (banded by grade) and question type. An exam that does not meet its TOS is revised before use."],
  ["9","Traceability through stable identifiers","Outcomes and items carry stable identifiers so results can be traced to item, outcome and standard. The instrument and the gradebook are separate records that share identifiers."],
  ["10","Vertical and horizontal coherence","Outcomes build on the grade below and prepare the grade above, and connect across subjects in the same grade. Coherence is demonstrated, not assumed."],
  ["11","Common structure now, common assessment over time","Every campus teaches to the same architecture and quality standard. The exam envelope is common now; assessment moves toward common content over time."],
  ["12","Review on a defined cadence, against evidence","Curriculum and assessment are reviewed on a set cadence using evidence — marks, item analysis, MAP, inspection findings. Each carries its last and next review dates."],
  ["13","One review structure for all","Reviews use a single structure across all subjects and grades, with grade- and subject-specific content inside it. A review not following the structure is not accepted."],
  ["14","Validation and record","No change takes effect without validation by the Validation Board and ratification by the AQC, recorded with approver, date and version. A review never enacted does not satisfy this principle."]
];

let view='start', topTab='review', subTab='summary', apAdding=false;
const main=document.getElementById('main'), crumbs=document.getElementById('crumbs');
function setActiveNav(v){document.querySelectorAll('#side a').forEach(a=>a.classList.remove('active'));
  const map={list:'list2',detail:'list2',principles:'principles',standards:'standards'};
  const t=map[v]||'list2';const el=document.querySelector('#side a[data-v="'+t+'"]');if(el)el.classList.add('active');}
function go(v){view=v;if(v==='list')topTab='review';render();window.scrollTo(0,0);return false}
function setTop(t){topTab=t;render();return false}
function openReview(){view='detail';subTab='summary';render();window.scrollTo(0,0);return false}
function setSub(t){subTab=t;render();window.scrollTo(0,0);return false}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;')}
function pick(el){el.parentNode.querySelectorAll('.sp').forEach(s=>s.classList.remove('active'));el.classList.add('active')}
function stageFlow(st){ // LH: flow steps for any given stage (used per-review on the dashboard)
  if(st==='approved') return [["Draft","done"],["Validation Board","done"],["Academic Quality Committee","done"],["Approved","current"]];
  if(st==='aqc') return [["Draft","done"],["Validation Board","done"],["Academic Quality Committee","current"],["Approved","todo"]];
  if(st==='validation') return [["Draft","done"],["Validation Board","current"],["Academic Quality Committee","todo"],["Approved","todo"]];
  return [["Draft","current"],["Validation Board","todo"],["Academic Quality Committee","todo"],["Approved","todo"]];
}
function curFlow(){ return stageFlow(stage); }
function ansText(k,v){ANSWERS[k]=ANSWERS[k]||{};ANSWERS[k].text=v}
function ansStat(k,s,el){el.parentNode.querySelectorAll('.sp').forEach(x=>x.classList.remove('active'));el.classList.add('active');ANSWERS[k]=ANSWERS[k]||{};ANSWERS[k].status=s}
function reviewMissing(){const m=[];SECTIONS.forEach(s=>s.qs.forEach(q=>{const k=q.tag.split(' ')[0];const a=ANSWERS[k]||{};if(!((a.text||'').trim())&&!a.status)m.push(k)}));return m}
function submitValidation(){
  const m=reviewMissing();
  if(m.length){alert('Not ready for validation.\n\n'+m.length+' of 17 questions still need a text answer or a status:\n'+m.join(',  ')+'\n\nAdd a response or a tick to each, then submit.');return false}
  stage='validation';view='validation';render();window.scrollTo(0,0);return false;
}
function flowHTML(f){let h='<div class="flow">';f.forEach((n,i)=>{const c=n[1]==='done'?'done':n[1]==='current'?'current':'';h+='<div class="node '+c+'"><span class="dot"></span><span class="lbl">'+n[0]+'</span></div>';if(i<f.length-1)h+='<div class="seg '+(f[i+1][1]!=='todo'?'done':'')+'"></div>'});return h+'</div>'}

function render(){

    '<button class="btn" onclick="return go(\'new\')">+ New review</button></div>'+
    '<div class="tabs"><button class="'+(topTab==='review'?'active':'')+'" onclick="setTop(\'review\')">Review</button>'+

  } else if(view==='detail'){ detail(); }
  else if(view==='validation'){ validationView(); }

function val(id){var e=document.getElementById(id);return e?(e.value||'').trim():'';}
function createReview(){
  const subject=val('nv_subject'), grade=val('nv_grade'), owner=val('nv_owner');
  if(!subject||!grade||!owner){alert('Please give at least a subject, a grade/phase, and an owner.');return false;}
  const rec=makeReview({subject:subject,grade:grade,owner:owner,email:val('nv_email'),
    campuses:val('nv_campus'),year:val('nv_year'),trigger:val('nv_trigger'),rationale:val('nv_rationale')});
  REVIEWS.push(rec); loadReview(rec);
  view='detail'; subTab='summary'; render(); window.scrollTo(0,0); return false;
}
function openReviewById(id){ const r=REVIEWS.filter(x=>x.id===id)[0]; if(r){ loadReview(r); view='detail'; subTab='summary'; render(); window.scrollTo(0,0);} return false; }

// LH: ----- Import from the CAR Review Template (.xlsx) -----
var importMode='current'; // LH: 'current' = fill the open draft; 'new' = create a review from the file
function startImport(mode){
  importMode=mode||'current';
  if(typeof XLSX==='undefined'){
    alert('The spreadsheet reader could not load (you may be offline). Reconnect and try again, or paste the Review tab instead.');
    return false;
  }
  var inp=document.getElementById('importFile'); if(inp){ inp.value=''; inp.click(); }
  return false;
}
function lhNorm(s){ return String(s==null?'':s).trim(); }
function lhStatus(s){ // LH: template label -> prototype status code
  var t=lhNorm(s).toLowerCase();
  if(t==='in place'||t==='ok'||t==='\u2713') return 'ok';
  if(t==='needs review'||t==='warn'||t==='\u25b3') return 'warn';
  if(t==='concern'||t==='con'||t==='\u2717') return 'con';
  return ''; // LH: blank or "N/A this cycle" -> no status; the answer text carries the N/A note
}
function lhCol(header,names){ // LH: find a column index by matching any of several header names
  for(var i=0;i<header.length;i++){ var h=lhNorm(header[i]).toLowerCase();
    for(var j=0;j<names.length;j++){ if(h===names[j]||h.indexOf(names[j])===0) return i; } }
  return -1;
}
function lhHeaderRow(rows,must){ // LH: locate the header row that contains a required label
  for(var i=0;i<rows.length;i++){ var r=rows[i]||[];
    for(var c=0;c<r.length;c++){ if(lhNorm(r[c]).toLowerCase().indexOf(must)===0) return i; } }
  return -1;
}
function lhNums(s){ return lhNorm(s).split(/[\s,;]+/).map(function(x){return parseInt(x,10);}).filter(function(n){return !isNaN(n);}); }

function parseInfo(rows){
  var out={}; if(!rows) return out;
  var map={'title':'title','review type':'type','subject':'subject','grade':'grade',
    'campus(es) in scope':'campuses','campus':'campuses','review year / cycle':'year','review year':'year',
    'review trigger':'trigger','owner email':'email','owner':'owner','rationale':'rationale'};
  rows.forEach(function(r){ if(!r||r.length<2) return; var key=lhNorm(r[0]).toLowerCase(); var val=lhNorm(r[1]);
    if(!val) return;
    // LH: check 'owner email' before 'owner'
    if(map[key]!==undefined) out[map[key]]=val;
  });
  return out;
}
function parseAnswers(rows){
  var out={}; if(!rows) return out;
  var hr=lhHeaderRow(rows,'q#'); if(hr<0) hr=0;
  var H=rows[hr]||[];
  var ci={q:lhCol(H,['q#','q']),a:lhCol(H,['answer']),s:lhCol(H,['status']),e:lhCol(H,['evidence'])};
  for(var i=hr+1;i<rows.length;i++){ var r=rows[i]||[]; var qid=lhNorm(r[ci.q]).toUpperCase().replace(/\s+/g,'');
    if(!/^Q\d+$/.test(qid)) continue;
    var text=ci.a>=0?lhNorm(r[ci.a]):''; var ev=ci.e>=0?lhNorm(r[ci.e]):'';
    var rawS=ci.s>=0?lhNorm(r[ci.s]):''; var st=lhStatus(rawS);
    var isNA=rawS.toLowerCase().indexOf('n/a')===0;
    if(!text&&!st&&!ev&&!isNA) continue; // LH: skip genuinely empty rows, but keep explicit N/A
    if(isNA&&!text) text='N/A this cycle';
    out[qid]={text:text,status:st}; if(ev) out[qid].evidence=ev;
  }
  return out;
}
function parseActions(rows){
  var out=[]; if(!rows) return out;
  var hr=lhHeaderRow(rows,'action id'); if(hr<0) hr=lhHeaderRow(rows,'description'); if(hr<0) return out;
  var H=rows[hr]||[];
  var ci={id:lhCol(H,['action id','id']),d:lhCol(H,['description']),p:lhCol(H,['principle']),
    q:lhCol(H,['question']),o:lhCol(H,['owner']),due:lhCol(H,['due']),ind:lhCol(H,['indicator']),s:lhCol(H,['status'])};
  for(var i=hr+1;i<rows.length;i++){ var r=rows[i]||[]; var desc=ci.d>=0?lhNorm(r[ci.d]):'';
    if(!desc) continue;
    out.push({ id:(ci.id>=0&&lhNorm(r[ci.id]))?lhNorm(r[ci.id]):'CAR-'+String(out.length+1).padStart(3,'0'),
      who:ci.o>=0?lhNorm(r[ci.o]):'', prin:ci.p>=0?lhNums(r[ci.p]):[], qs:ci.q>=0?lhNums(r[ci.q]):[],
      status:(ci.s>=0&&lhNorm(r[ci.s]))?lhNorm(r[ci.s]):'Open', desc:desc,
      due:ci.due>=0?(lhNorm(r[ci.due])||'\u2014'):'\u2014', ind:ci.ind>=0?(lhNorm(r[ci.ind])||'\u2014'):'\u2014' });
  }
  return out;
}
function sheetRows(wb,name){ // LH: return a sheet as an array-of-arrays, tolerant of exact name
  var key=null; wb.SheetNames.forEach(function(n){ if(n.toLowerCase()===name.toLowerCase()) key=n; });
  if(!key) wb.SheetNames.forEach(function(n){ if(n.toLowerCase().indexOf(name.toLowerCase())===0) key=n; });
  if(!key) return null;
  return XLSX.utils.sheet_to_json(wb.Sheets[key],{header:1,raw:false,defval:''});
}
function applyImport(info,answers,actions){
  var rec;
  if(importMode==='new' || !REVIEW){
    rec=makeReview(info); REVIEWS.push(rec); loadReview(rec);
  } else {
    if(stage!=='draft'){ alert('This review is locked. Imports can only be applied to a draft.'); return; }
    rec=REVIEW;
    ['title','type','subject','grade','campuses','year','trigger','owner','email','rationale'].forEach(function(f){
      if(info[f]) rec[f]=info[f];
    });
  }
  ANSWERS=rec.answers=answers||{};
  if(actions&&actions.length){ ACTIONS=rec.actions=actions; apN=actions.length+1; }
  stage=rec.stage='draft';
  view='detail'; subTab='review'; render(); window.scrollTo(0,0);
  var cnt={ok:0,warn:0,con:0,na:0};
  Object.keys(answers||{}).forEach(function(k){ var s=answers[k].status; if(s==='ok')cnt.ok++; else if(s==='warn')cnt.warn++; else if(s==='con')cnt.con++; else cnt.na++; });
  alert('Imported '+Object.keys(answers||{}).length+' answers ('+cnt.ok+' in place, '+cnt.warn+' needs review, '+cnt.con+' concern, '+cnt.na+' no status / N/A) and '+(actions?actions.length:0)+' actions.\n\nThis is a draft. Review and verify each answer, then Submit to Validation.');
}
(function(){
  var inp=document.getElementById('importFile');
  if(!inp) return;
  inp.addEventListener('change',function(e){
    var f=e.target.files&&e.target.files[0]; if(!f) return;
    var rd=new FileReader();
    rd.onload=function(ev){
      try{
        var wb=XLSX.read(ev.target.result,{type:'array'});
        var info=parseInfo(sheetRows(wb,'Review Info'));
        var answers=parseAnswers(sheetRows(wb,'Review'));
        var actions=parseActions(sheetRows(wb,'Action Plan'));
        if(!Object.keys(answers).length && importMode==='current'){
          alert('No answers found. Make sure this is the CAR Review Template with a "Review" tab and a Q# column.'); return;
        }
        applyImport(info,answers,actions);
      }catch(err){ alert('Could not read that file. Please use the CAR Review Template (.xlsx).\n\n'+(err&&err.message?err.message:err)); }
    };
    rd.readAsArrayBuffer(f);
    e.target.value='';
  });
})();

function lhLum(hex){ // LH: rough luminance so header text can flip light on dark backgrounds
  hex=(hex||'').replace('#','');
  if(hex.length===3) hex=hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
  var r=parseInt(hex.substr(0,2),16),g=parseInt(hex.substr(2,2),16),b=parseInt(hex.substr(4,2),16);
  if(isNaN(r)||isNaN(g)||isNaN(b)) return 255;
  return 0.299*r+0.587*g+0.114*b;
}
